{% extends "base.html" %}

{% block content %}

<div class="admin-header">

<h1>Produtos</h1>

<a href="{{ url_for('admin_product_new') }}" class="btn btn-primary">
Novo Produto
</a>

</div>

<div class="admin-table">

<table>

<thead>
<tr>
<th>ID</th>
<th>Imagem</th>
<th>Nome</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>

<tbody>

{% for p in products %}

<tr>

<td>{{ p.id }}</td>

<td>
{% if p.image %}
<img src="{{ p.image }}" style="height:50px">
{% else %}
-
{% endif %}
</td>

<td>{{ p.name }}</td>

<td>
{% if p.is_active %}
<span class="badge badge-success">Ativo</span>
{% else %}
<span class="badge badge-danger">Inativo</span>
{% endif %}
</td>

<td>

<a href="{{ url_for('admin_product_edit', product_id=p.id) }}" class="btn btn-small">
Editar
</a>

<a href="{{ url_for('admin_product_delete', product_id=p.id) }}" class="btn btn-small btn-danger">
Excluir
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
